<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🤍</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: 'Itim', 'Fredoka', cursive;
    background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 35%, #ddd6fe 70%, #f5f3ff 100%);
    overflow-x: hidden;
    position: relative;
    padding: 40px 20px;
  }

  /* Floating sparkles background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.8), transparent),
      radial-gradient(2px 2px at 60% 70%, rgba(221,214,254,0.9), transparent),
      radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.7), transparent),
      radial-gradient(2px 2px at 80% 10%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 90% 60%, rgba(221,214,254,0.8), transparent),
      radial-gradient(2px 2px at 33% 80%, rgba(255,255,255,0.7), transparent);
    background-size: 300px 300px;
    pointer-events: none;
    animation: twinkle 6s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    position: relative;
    z-index: 2;
  }

  .card {
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 32px;
    padding: 40px 32px;
    box-shadow:
      0 20px 60px rgba(167, 139, 250, 0.25),
      0 0 0 1px rgba(255, 255, 255, 0.5) inset;
    text-align: center;
    position: relative;
  }

  /* Top header */
  .header {
    margin-bottom: 28px;
    position: relative;
  }

  .hbd-title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(40px, 8vw, 64px);
    background: linear-gradient(135deg, #a78bfa 0%, #c084fc 50%, #e879f9 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    text-shadow: 0 4px 20px rgba(167, 139, 250, 0.3);
    animation: bounce 2.5s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .subtitle {
    font-size: clamp(18px, 3vw, 24px);
    color: #8b5cf6;
    margin-top: 8px;
    font-family: 'Itim', cursive;
  }

  /* Photo frame */
  .photo-frame {
    position: relative;
    width: 280px;
    height: 360px;
    margin: 28px auto;
    border-radius: 24px;
    overflow: hidden;
    box-shadow:
      0 16px 40px rgba(167, 139, 250, 0.35),
      0 0 0 6px white,
      0 0 0 8px #c084fc;
    transition: transform 0.4s ease;
  }

  .photo-frame:hover {
    transform: scale(1.03) rotate(-1deg);
  }

  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Decorative bow on photo */
  .bow {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 40px;
    filter: drop-shadow(0 4px 8px rgba(167, 139, 250, 0.4));
    z-index: 3;
  }

  /* Message */
  .message {
    font-size: clamp(17px, 3vw, 20px);
    color: #6d28d9;
    line-height: 1.8;
    margin: 24px auto;
    max-width: 520px;
    padding: 20px;
    background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(243,232,255,0.6));
    border-radius: 20px;
    border: 2px dashed #c4b5fd;
  }

  .message .highlight {
    color: #a855f7;
    font-weight: 700;
  }

  .heart {
    color: #d8b4fe;
    display: inline-block;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  /* Cute creature row */
  .creatures {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .creature {
    font-size: 48px;
    display: inline-block;
    animation: wiggle 3s ease-in-out infinite;
  }

  .creature:nth-child(2) { animation-delay: 0.5s; }
  .creature:nth-child(3) { animation-delay: 1s; }
  .creature:nth-child(4) { animation-delay: 1.5s; }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-8deg) translateY(0); }
    50% { transform: rotate(8deg) translateY(-10px); }
  }

  /* Floating butterflies */
  .butterfly {
    position: fixed;
    font-size: 32px;
    pointer-events: none;
    z-index: 1;
    animation: fly 12s ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(167, 139, 250, 0.3));
  }

  .butterfly.b1 { top: 10%; left: 5%; animation-delay: 0s; }
  .butterfly.b2 { top: 30%; right: 8%; animation-delay: 2s; font-size: 28px; }
  .butterfly.b3 { top: 60%; left: 8%; animation-delay: 4s; font-size: 36px; }
  .butterfly.b4 { top: 80%; right: 5%; animation-delay: 6s; font-size: 26px; }
  .butterfly.b5 { top: 50%; right: 15%; animation-delay: 1s; font-size: 30px; }

  @keyframes fly {
    0%   { transform: translate(0, 0) rotate(-10deg); }
    25%  { transform: translate(40px, -30px) rotate(15deg); }
    50%  { transform: translate(80px, 10px) rotate(-5deg); }
    75%  { transform: translate(20px, 40px) rotate(20deg); }
    100% { transform: translate(0, 0) rotate(-10deg); }
  }

  /* Floating dinosaurs */
  .dino-float {
    position: fixed;
    font-size: 44px;
    pointer-events: none;
    z-index: 1;
    animation: hop 4s ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(167, 139, 250, 0.3));
  }

  .dino-float.d1 { bottom: 5%; left: 4%; animation-delay: 0s; }
  .dino-float.d2 { top: 15%; right: 4%; animation-delay: 1.5s; }
  .dino-float.d3 { bottom: 20%; right: 6%; animation-delay: 2.5s; font-size: 38px; }

  @keyframes hop {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50%      { transform: translateY(-20px) rotate(5deg); }
  }

  /* Cake */
  .cake {
    margin-top: 20px;
    font-size: 56px;
    animation: bounce 2s ease-in-out infinite;
    animation-delay: 0.5s;
  }

  /* Signature */
  .signature {
    margin-top: 20px;
    font-size: 18px;
    color: #9333ea;
    font-style: italic;
  }

  /* Confetti */
  .confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    animation: confetti-fall 5s linear infinite;
  }

  @keyframes confetti-fall {
    0% {
      transform: translateY(-100vh) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(100vh) rotate(720deg);
      opacity: 0;
    }
  }

  /* Button */
  .surprise-btn {
    margin-top: 20px;
    background: linear-gradient(135deg, #c084fc, #a78bfa);
    color: white;
    border: none;
    padding: 14px 32px;
    font-size: 18px;
    font-family: 'Itim', cursive;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(167, 139, 250, 0.4);
    transition: all 0.3s ease;
  }

  .surprise-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 28px rgba(167, 139, 250, 0.5);
  }

  .surprise-btn:active {
    transform: translateY(0);
  }

  @media (max-width: 480px) {
    .photo-frame { width: 240px; height: 310px; }
    .card { padding: 28px 20px; }
    .creature { font-size: 38px; }
    .butterfly, .dino-float { font-size: 24px !important; }
  }
</style>
</head>
<body>

  <!-- Floating decorations -->
  <div class="butterfly b1">🦋</div>
  <div class="butterfly b2">🦋</div>
  <div class="butterfly b3">🦋</div>
  <div class="butterfly b4">🦋</div>
  <div class="butterfly b5">🦋</div>

  <div class="dino-float d1">🦕</div>
  <div class="dino-float d2">🦖</div>
  <div class="dino-float d3">🦕</div>

  <div class="container">
    <div class="card">

      <div class="header">
        <div class="hbd-title">Happy Birthday</div>
        <div class="subtitle">🎂 สุขสันต์วันเกิดน้า PAEYAH 🎂</div>
      </div>

      <div class="photo-frame">
        <div class="bow">🎀</div>
        <img src="photo.jpg" alt="Birthday photo"
             onerror="this.style.display='none'; this.parentNode.innerHTML += '<div style=&quot;padding:40px 20px;color:#8b5cf6;font-size:16px;text-align:center;background:linear-gradient(135deg,#f3e8ff,#e9d5ff);height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;&quot;><div style=&quot;font-size:60px;&quot;>📸</div><div>วางไฟล์รูป<br><b>photo.jpg</b><br>ในโฟลเดอร์เดียวกับ index.html</div></div>'">
      </div>

      <div class="creatures">
        <span class="creature">🦋</span>
        <span class="creature">🦕</span>
        <span class="creature">🦖</span>
        <span class="creature">🦋</span>
      </div>

      <div class="message">
        🎉 <span class="highlight">HBD</span> นะ! <br>
        ขอให้<span class="highlight">สุขภาพแข็งแรง</span> <span class="heart">🤍</span><br>
        เจอแต่<span class="highlight">สิ่งดี ๆ</span> เข้ามาในชีวิต<br>
        มี<span class="highlight">ความสุข</span> สดใสทุกวัน<br>
        แล้วก็ Happy เยอะ ๆ น้า <span class="heart">🤍</span>
      </div>

      <div class="cake">🎂</div>

      <button class="surprise-btn" onclick="celebrate()">กดเพื่อเซอร์ไพรส์ ✨</button>

      <div class="signature">— with lots of love 🤍 —</div>

    </div>
  </div>

<script>
  // Confetti celebration
  function celebrate() {
    const colors = ['#c084fc', '#a78bfa', '#ddd6fe', '#e9d5ff', '#f3e8ff', '#d8b4fe'];
    const emojis = ['🦋', '🦕', '🦖', '🎀', '🤍', '✨', '💜', '🎂'];

    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      const useEmoji = Math.random() > 0.5;
      if (useEmoji) {
        piece.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        piece.style.cssText = `
          position: fixed;
          left: ${Math.random() * 100}vw;
          top: -50px;
          font-size: ${20 + Math.random() * 20}px;
          pointer-events: none;
          z-index: 100;
          animation: confetti-fall ${3 + Math.random() * 3}s linear forwards;
          animation-delay: ${Math.random() * 2}s;
        `;
      } else {
        piece.className = 'confetti';
        piece.style.cssText = `
          position: fixed;
          left: ${Math.random() * 100}vw;
          top: -20px;
          width: ${8 + Math.random() * 8}px;
          height: ${8 + Math.random() * 8}px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          border-radius: ${Math.random() > 0.5 ? '50%' : '4px'};
          pointer-events: none;
          z-index: 100;
          animation: confetti-fall ${3 + Math.random() * 3}s linear forwards;
          animation-delay: ${Math.random() * 2}s;
        `;
      }
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 7000);
    }
  }

  // Auto-celebrate on page load
  window.addEventListener('load', () => {
    setTimeout(celebrate, 500);
  });
</script>
</body>
</html>
